<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星の道</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050510; 
            font-family: 'Segoe UI', sans-serif; 
            color: #fff; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            -webkit-touch-callout: none; 
        }
        canvas { 
            display: block; 
            touch-action: none; 
        }
        
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 100; }
        #scoreBoard { font-size: 26px; font-weight: bold; text-shadow: 0 0 10px #0ff; letter-spacing: 2px; }
        #timeBoard { font-size: 18px; font-weight: bold; text-shadow: 0 0 8px #0ff; margin-top: 5px; color: #b2ebf2; letter-spacing: 1px; }
        
        .top-controls {
            position: absolute; top: 20px; right: 20px; 
            display: flex; gap: 10px; z-index: 100; pointer-events: auto; align-items: center;
            flex-wrap: wrap; justify-content: flex-end; max-width: 70%;
            transition: opacity 0.3s;
        }

        .zoom-controls {
            display: flex; align-items: center; gap: 5px;
            background: rgba(0, 229, 255, 0.1);
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.3);
        }
        .zoomBtn {
            background: transparent; color: #00e5ff; border: none; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
            touch-action: manipulation;
        }
        .zoomBtn:hover { transform: scale(1.3); text-shadow: 0 0 5px #0ff; }
        #zoomLabel { font-size: 14px; font-weight: bold; color: #00e5ff; min-width: 45px; text-align: center; }

        .controlBtn {
            padding: 8px 15px; font-size: 14px; font-weight: bold; 
            color: #050510; background: #00e5ff; border: none; border-radius: 20px; 
            cursor: pointer; box-shadow: 0 0 10px #0ff; transition: 0.2s; 
            touch-action: manipulation;
        }
        .controlBtn:hover { transform: scale(1.1); box-shadow: 0 0 20px #00e5ff; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,16,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.3s; z-index: 10; }
        .hidden { opacity: 0; pointer-events: none; }
        h1 { font-size: 55px; color: #e0f7fa; text-shadow: 0 0 20px #0ff; margin-bottom: 10px; letter-spacing: 4px; }
        p { font-size: 18px; color: #b2ebf2; margin-bottom: 30px; text-align: center; line-height: 1.5; }
        
        button.actionBtn { padding: 12px 35px; font-size: 18px; font-weight: bold; color: #050510; background: #00e5ff; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 0 15px #0ff; transition: 0.2s; touch-action: manipulation; }
        button.actionBtn:hover { transform: scale(1.05); box-shadow: 0 0 25px #00e5ff; }

        #warning { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: #ff1744; text-shadow: 0 0 20px #ff1744; letter-spacing: 5px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 50; }
        .blink { animation: blinkAnim 0.5s infinite alternate; opacity: 1 !important; }
        @keyframes blinkAnim { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui">
        <div id="scoreBoard">Score: <span id="score">0</span></div>
        <div id="timeBoard">Time: <span id="time">0.0</span></div>
    </div>
    
    <div id="topControls" class="top-controls">
        <div class="zoom-controls">
            <button id="zoomOutBtn" class="zoomBtn">－</button>
            <span id="zoomLabel">100%</span>
            <button id="zoomInBtn" class="zoomBtn">＋</button>
        </div>
        <button id="qualityBtn" class="controlBtn">高画質モード</button>
        <button id="fullscreenBtn" class="controlBtn">全画面</button>
        <button id="shareBtn" class="controlBtn">共有</button>
    </div>
    
    <div id="warning">METEOR SHOWER COMING...</div>

<div id="startScreen" class="overlay">
        <h1 id="title">星の道</h1>
        <p id="msg"><br>【Space または ESCキーで一時停止】</p>
        <div style="display: flex; gap: 15px;">
            <button id="startBtn" class="actionBtn">START</button>
            <button id="endlessBtn" class="actionBtn" style="display: none; background: #ffea00; box-shadow: 0 0 15px #ffea00;">ENDLESS</button>
        </div>
    </div>

    <div id="pauseScreen" class="overlay hidden">
        <h1>PAUSE</h1>
        <p>ゲーム一時停止中...<br>Space / ESCキー または ボタンで再開</p>
        <button id="resumeBtn" class="actionBtn">RESUME</button>
    </div>

    <!-- ゲーム共有用モーダルウィンドウ -->
    <div id="shareModal" class="overlay hidden" style="z-index: 150;">
        <div style="background: rgba(5, 5, 16, 0.95); padding: 30px; border-radius: 20px; border: 2px solid #00e5ff; text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.5); max-width: 90%; width: 280px;">
            <h2 style="color: #00e5ff; margin: 0 0 10px 0; font-size: 24px; text-shadow: 0 0 10px #0ff;">ゲームを共有</h2>
            <img src="QR.png" alt="QRコード" style="width: 200px; height: 200px; border-radius: 10px; margin: 15px 0; background: white; padding: 5px;">
            <p style="font-size: 14px; color: #b2ebf2; margin: 0 0 20px 0; line-height: 1.4;">このQRコードをスキャンして<br>ゲームをシェアしよう！</p>
            <button id="closeShareBtn" class="actionBtn" style="padding: 8px 25px; font-size: 16px; border-radius: 20px;">閉じる</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const warningEl = document.getElementById('warning');
        const pauseScreen = document.getElementById('pauseScreen');
        const topControls = document.getElementById('topControls');
        const shareModal = document.getElementById('shareModal');
        const timeEl = document.getElementById('time');
        
        let animId;
        let score = 0;
        let survivalFrames = 0; // 生存フレーム数
        let isPlaying = false;
        let isPaused = false;
        let isHighQuality = true;
        let isEndless = false;

        const player = { x: 0, y: 0, radius: 10, trail: [], invincibleTimer: 0 };
        let mouse = { x: 0, y: 0 };
        let zoomLevel = 1.0;
        let gameWidth, gameHeight;

        let shockwave = { active: false, x: 0, y: 0, radius: 0, maxRadius: 0 };

        function updateGameSize() {
            gameWidth = canvas.width / zoomLevel;
            gameHeight = canvas.height / zoomLevel;
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateGameSize();
            if(!isPlaying) { player.x = gameWidth/2; player.y = gameHeight/2; }
        }
        window.addEventListener('resize', resize);
        resize();

        // コントロールメニューの表示/非表示を切り替える関数
        function updateControlsVisibility() {
            if (isPlaying && !isPaused) {
                topControls.classList.add('hidden');
            } else {
                topControls.classList.remove('hidden');
            }
        }

        document.getElementById('zoomInBtn').addEventListener('click', () => {
            zoomLevel = Math.min(2.0, zoomLevel + 0.25);
            document.getElementById('zoomLabel').innerText = Math.round(zoomLevel * 100) + '%';
            updateGameSize();
        });
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            zoomLevel = Math.max(0.5, zoomLevel - 0.25);
            document.getElementById('zoomLabel').innerText = Math.round(zoomLevel * 100) + '%';
            updateGameSize();
        });

        window.addEventListener('mousemove', e => { 
            mouse.x = e.clientX / zoomLevel; 
            mouse.y = e.clientY / zoomLevel; 
        });

        window.addEventListener('touchmove', e => { 
            if (e.touches.length > 0) {
                e.preventDefault(); 
                mouse.x = e.touches[0].clientX / zoomLevel; 
                mouse.y = e.touches[0].clientY / zoomLevel; 
            }
        }, { passive: false });

        window.addEventListener('touchstart', e => {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('contextmenu', e => {
            e.preventDefault();
        });

        let enemies = [], particles = [], milkyWays = [];
        let targets = []; 

        let eventTimer = 0;
        let isMeteorShower = false;
        let meteorSpawnCount = 0;
        let meteorDirectionIndex = 0;
        let milkyWayTimer = 0;

document.getElementById('startBtn').addEventListener('click', startGame);
        // ★【追加】エンドレスボタンが押されたら、画面を隠してゲームの更新（ループ）を再開する
        document.getElementById('endlessBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.add('hidden');
            isEndless = true;
            isPlaying = true;
            updateControlsVisibility();
            update(); // ゲームループを再開
        });
        document.getElementById('resumeBtn').addEventListener('click', togglePause);
        
        // 共有モーダルのイベント
        document.getElementById('shareBtn').addEventListener('click', () => {
            shareModal.classList.remove('hidden');
        });
        document.getElementById('closeShareBtn').addEventListener('click', () => {
            shareModal.classList.add('hidden');
        });

        document.getElementById('qualityBtn').addEventListener('click', () => {
            isHighQuality = !isHighQuality;
            document.getElementById('qualityBtn').innerText = isHighQuality ? "高画質モード" : "軽量モード";
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.warn(err.message));
                document.getElementById('fullscreenBtn').innerText = "閉じる";
            } else {
                document.exitFullscreen();
                document.getElementById('fullscreenBtn').innerText = "全画面";
            }
        });

        window.addEventListener('keydown', e => {
            if ((e.key === 'Escape' || e.key === ' ') && isPlaying) {
                if (!shareModal.classList.contains('hidden')) {
                    shareModal.classList.add('hidden');
                    return;
                }
                e.preventDefault(); 
                togglePause();
            }
        });

        function togglePause() {
            if (!isPlaying) return; 
            isPaused = !isPaused;
            updateControlsVisibility(); 
            if (isPaused) {
                pauseScreen.classList.remove('hidden');
                cancelAnimationFrame(animId); 
            } else {
                pauseScreen.classList.add('hidden');
                update(); 
            }
        }

        function spawnTarget() {
            targets.push({ x: 50 + Math.random()*(gameWidth-100), y: 50 + Math.random()*(gameHeight-100), r: 8, pulse: Math.random()*Math.PI });
        }

        function spawnTargetAround(cx, cy) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 120; 
            const x = Math.max(50, Math.min(gameWidth - 50, cx + Math.cos(angle) * dist));
            const y = Math.max(50, Math.min(gameHeight - 50, cy + Math.sin(angle) * dist));
            targets.push({ x, y, r: 8, pulse: Math.random() * Math.PI });
        }

        function spawnEnemy() {
            const scoreFactor = Math.floor(score / 100);
            const size = 6 + Math.random() * 5 + (scoreFactor * 0.5); 
            let x, y;
            if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -30 : gameWidth + 30; y = Math.random() * gameHeight; } 
            else { x = Math.random() * gameWidth; y = Math.random() < 0.5 ? -30 : gameHeight + 30; }
            
            const tx = targets.length > 0 ? targets[0].x : player.x;
            const ty = targets.length > 0 ? targets[0].y : player.y;
            const angle = Math.atan2(ty - y, tx - x) + (Math.random() - 0.5) * 0.5;
            const speed = 4 + Math.random() * 3 + (scoreFactor * 0.4); 
            
            enemies.push({ x, y, r: size, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, isMeteor: false, isBlue: false });
        }

        function spawnBlueEnemy() {
            const scoreFactor = Math.floor(score / 100);
            const size = 5 + Math.random() * 4 + (scoreFactor * 0.5);
            let x, y;
            if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -30 : gameWidth + 30; y = Math.random() * gameHeight; } 
            else { x = Math.random() * gameWidth; y = Math.random() < 0.5 ? -30 : gameHeight + 30; }
            
            enemies.push({ 
                x, y, r: size, vx: 0, vy: 0, 
                isMeteor: false, isBlue: true, 
                timer: 0, state: 'normal', opacity: 1 
            });
        }

        function createDiagonalEntry(diagIndex, minSpeed, maxSpeed) {
            const cx = gameWidth / 2; const cy = gameHeight / 2;
            const R = Math.hypot(cx, cy) + 60;
            const actualDir = (diagIndex * 2) + 1;
            const baseAngle = (actualDir * Math.PI / 4) - (Math.PI / 2);
            
            const spawnAngle = baseAngle + (Math.random() - 0.5) * (Math.PI / 3);
            const x = cx + Math.cos(spawnAngle) * R;
            const y = cy + Math.sin(spawnAngle) * R;
            
            const moveAngle = baseAngle + Math.PI + (Math.random() - 0.5) * 0.4;
            const speed = minSpeed + Math.random() * (maxSpeed - minSpeed);
            return { x, y, vx: Math.cos(moveAngle) * speed, vy: Math.sin(moveAngle) * speed };
        }

        function spawnShowerChaser(diagIndex) {
            const scoreFactor = Math.floor(score / 100);
            const size = 5 + Math.random() * 4 + (scoreFactor * 0.5);
            const entryData = createDiagonalEntry(diagIndex, 8 + scoreFactor * 0.4, 13 + scoreFactor * 0.4);
            enemies.push({
                x: entryData.x, y: entryData.y, r: size, vx: entryData.vx, vy: entryData.vy,
                isMeteor: false, isBlue: true, timer: 0, state: 'normal', opacity: 1
            });
        }

function spawnMilkyWay() {
            const cx = gameWidth / 2;
            const cy = gameHeight / 2;
            const angle = Math.random() * Math.PI; 
            const offsetDist = (Math.random() - 0.5) * Math.min(gameWidth, gameHeight) * 0.8; 
            
            const x = cx + Math.cos(angle + Math.PI/2) * offsetDist;
            const y = cy + Math.sin(angle + Math.PI/2) * offsetDist;

            const mwWidth = Math.max(40, 140 - Math.floor(score / 200) * 12);
            const colorType = Math.random() < 0.5 ? 'blue' : 'yellow';

            // ★【追加】レーザーが横にスライドする速度と方向（法線方向）を計算
            const moveSpeed = 0.3 + Math.random() * 0.5; // 移動速度
            const dir = Math.random() < 0.5 ? 1 : -1;    // 移動方向（正か負か）
            const vx = -Math.sin(angle) * moveSpeed * dir;
            const vy = Math.cos(angle) * moveSpeed * dir;

            milkyWays.push({
                x: x, y: y, angle: angle, width: mwWidth,
                state: 'warning', timer: 0, opacity: 0, colorType: colorType,
                vx: vx, vy: vy // ★【追加】速度プロパティを持たせる
            });
        }

        function createParticles(x, y, color, count) {
            for (let i=0; i<count; i++) {
                const a = Math.random() * Math.PI * 2;
                const s = Math.random() * 4 + 1;
                particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: Math.random()*3+2, color, life: 1, decay: Math.random()*0.02+0.02 });
            }
            if (particles.length > 200) particles.splice(0, particles.length - 200);
        }

        function distSq(p1, p2) { return (p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2; }

        function checkMilkyWayCollision(p, mw) {
            if (mw.state !== 'active') return false;
            const dx = p.x - mw.x;
            const dy = p.y - mw.y;
            const dist = Math.abs(-Math.sin(mw.angle) * dx + Math.cos(mw.angle) * dy);
            return dist < (mw.width / 2 + p.radius - 4); 
        }

        function drawGlowObj(x, y, r, color, shadowColor, blur) {
            if (isHighQuality) {
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
                ctx.fillStyle = color; ctx.shadowBlur = blur; ctx.shadowColor = shadowColor; 
                ctx.fill(); ctx.shadowBlur = 0;
            } else {
                if (blur > 0) {
                    ctx.beginPath(); ctx.arc(x, y, r + blur * 0.4, 0, Math.PI*2);
                    ctx.fillStyle = shadowColor; ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1.0;
                }
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
                ctx.fillStyle = color; ctx.fill();
            }
        }

        function triggerCharge(e) {
            if (e.state === 'normal') {
                e.state = 'charging';
                const angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
                const chargeSpeed = 16 + (Math.floor(score / 100) * 0.8);
                e.vx = Math.cos(angleToPlayer) * chargeSpeed; e.vy = Math.sin(angleToPlayer) * chargeSpeed;
                createParticles(e.x, e.y, '#00e5ff', 10);
            }
        }

        function handlePlayerHit() {
            if (score >= 1000) {
                score -= 1000; 
                document.getElementById('score').innerText = score; 
                
                player.invincibleTimer = 120; 
                shockwave.active = true;
                shockwave.x = player.x;
                shockwave.y = player.y;
                shockwave.radius = 0;
                shockwave.maxRadius = Math.max(gameWidth, gameHeight) * 0.4; 
                
                for (let k = 0; k < 5; k++) {
                    spawnTargetAround(player.x, player.y);
                }
                
                
                createParticles(player.x, player.y, '#00e5ff', 30);
                return true; 
            }
            gameOver();
            return false; 
        }

        function update() {
            if (!isPlaying || isPaused) return;

            survivalFrames++;
            timeEl.innerText = (survivalFrames / 60).toFixed(1);

            // ★【変更】スコアが100000以上、かつ「エンドレスモードではない時」だけクリアにする
            if (score >= 10000 && !isEndless) {
                gameClear();
                return;
            }


            // ★【追加】ゲームクリア時の処理
        function gameClear() {
            isPlaying = false;
            cancelAnimationFrame(animId);
            warningEl.classList.remove('blink');
            
            ctx.globalCompositeOperation = 'lighter';
            // クリア演出として金色のパーティクルを大量に生成
            createParticles(player.x, player.y, '#ffea00', 100);
            
            function renderClearExplode() {
                ctx.globalCompositeOperation = 'source-over';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.fillStyle = 'rgba(5,5,16,0.2)'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.scale(zoomLevel, zoomLevel);
                ctx.globalCompositeOperation = 'lighter';

                let active = false;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                    if (p.life > 0) {
                        active = true; 
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
                        ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
                
if (active) {
                    requestAnimationFrame(renderClearExplode);
                } else {
                    // クリア画面のテキスト設定
                    document.getElementById('title').innerText = "GAME CLEAR!";
                    document.getElementById('title').style.color = "#00e5ff"; // 水色
                    document.getElementById('msg').innerText = `おめでとう！星の道を突破した！
最終スコア: ${score}
生存時間: ${(survivalFrames / 60).toFixed(1)}秒
【Space または ESCキーで一時停止】`;
                    document.getElementById('startBtn').innerText = "PLAY AGAIN";
                    
                    // ★【追加】クリア時のみエンドレスボタンを表示する
                    document.getElementById('endlessBtn').style.display = "inline-block";

                    document.getElementById('startScreen').classList.remove('hidden');
                    updateControlsVisibility(); 
                }            }
            renderClearExplode();
        }

            if (player.invincibleTimer > 0) player.invincibleTimer--;

            ctx.globalCompositeOperation = 'source-over';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.scale(zoomLevel, zoomLevel);
            ctx.globalCompositeOperation = 'lighter';

            if (shockwave.active) {
                shockwave.radius += 24;
                ctx.beginPath();
                ctx.arc(shockwave.x, shockwave.y, shockwave.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 229, 255, ${1 - shockwave.radius / shockwave.maxRadius})`;
                ctx.lineWidth = 15; 
                ctx.stroke();

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    if (distSq(shockwave, e) < (shockwave.radius + e.r) ** 2) {
                        createParticles(e.x, e.y, e.isBlue ? '#00e5ff' : '#ff7676', 8);
                        enemies.splice(i, 1);
                    }
                }
                if (shockwave.radius >= shockwave.maxRadius) shockwave.active = false;
            }

            player.x += (mouse.x - player.x) * 0.15;
            player.y += (mouse.y - player.y) * 0.15;
            player.trail.push({x: player.x, y: player.y});
            if (player.trail.length > 10) player.trail.shift();

            let isMilkyWayActive = milkyWays.length > 0;

            if (isMilkyWayActive) {
                if (eventTimer > 490) eventTimer = 490;
            } else {
                eventTimer++;
            }

            if (!isMeteorShower && eventTimer < 490) {
                milkyWayTimer++;
            }

if (milkyWayTimer > 700 && !isMeteorShower && eventTimer < 490) { 
                // ★【変更】Math.minを使って、計算結果が20を超えないように上限を設定
                const mwCount = Math.min(20, 3 + Math.floor(score / 200)); 
                
                for(let k = 0; k < mwCount; k++){
                    spawnMilkyWay(); 
                }
                milkyWayTimer = Math.random() * 300; 
            }

            if (eventTimer === 500) warningEl.classList.add('blink');
            if (eventTimer === 680) {
                warningEl.classList.remove('blink');
                isMeteorShower = true; meteorSpawnCount = 500;
                meteorDirectionIndex = Math.floor(Math.random() * 4); 
            }

            if (isMeteorShower && meteorSpawnCount > 0) {
                let spawnCountThisFrame = Math.floor(Math.random() * 3) + 1;
                for (let k = 0; k < spawnCountThisFrame; k++) {
                    if (meteorSpawnCount <= 0) break;
                    spawnShowerChaser(meteorDirectionIndex); meteorSpawnCount--;
                }
                if (meteorSpawnCount <= 0) { isMeteorShower = false; eventTimer = 0; }
            }

            for (let i = milkyWays.length - 1; i >= 0; i--) {
                let mw = milkyWays[i];
                mw.timer++;
                mw.x += mw.vx;
                mw.y += mw.vy;
                
                const len = gameWidth + gameHeight; 
                const nx = Math.cos(mw.angle) * len;
                const ny = Math.sin(mw.angle) * len;

                const isBlue = mw.colorType === 'blue';
                const mainColor = isBlue ? `rgba(0, 100, 255, ` : `rgba(255, 150, 0, `;
                const subColor  = isBlue ? `rgba(100, 220, 255, ` : `rgba(255, 255, 150, `;
                const glowColor = isBlue ? '#0070ff' : '#ffaa00';
                const pColor    = isBlue ? '#00bcff' : '#ffea00';

                if (mw.state === 'warning') {
                    mw.opacity = 0.1 + Math.abs(Math.sin(mw.timer * 0.1)) * 0.3; 
                    if (mw.timer >= 120) { mw.state = 'active'; mw.timer = 0; mw.opacity = 1; }
                    
                    ctx.beginPath();
                    ctx.moveTo(mw.x - nx, mw.y - ny); ctx.lineTo(mw.x + nx, mw.y + ny);
                    ctx.strokeStyle = isBlue ? `rgba(0, 200, 255, ${mw.opacity})` : `rgba(255, 230, 0, ${mw.opacity})`;
                    ctx.lineWidth = mw.width;
                    ctx.stroke();

                } else if (mw.state === 'active') {
                    if (Math.random() < 0.6) {
                        const pDist = (Math.random() - 0.5) * len;
                        const orthoDist = (Math.random() - 0.5) * mw.width * 0.8; 
                        const px = mw.x + Math.cos(mw.angle) * pDist + Math.cos(mw.angle + Math.PI/2) * orthoDist;
                        const py = mw.y + Math.sin(mw.angle) * pDist + Math.sin(mw.angle + Math.PI/2) * orthoDist;
                        createParticles(px, py, pColor, 1);
                    }
                    if (mw.timer >= 180) { mw.state = 'fading'; mw.timer = 0; }
                    
if (player.invincibleTimer <= 0 && checkMilkyWayCollision(player, mw)) { 
                        gameOver();
                        return; 
                    }

                    ctx.beginPath();
                    ctx.moveTo(mw.x - nx, mw.y - ny); ctx.lineTo(mw.x + nx, mw.y + ny);
                    
                    if (isHighQuality) { ctx.shadowBlur = 30; ctx.shadowColor = glowColor; }

                    ctx.strokeStyle = `${mainColor}${mw.opacity * 0.5})`;
                    ctx.lineWidth = mw.width; ctx.stroke();

                    ctx.strokeStyle = `${subColor}${mw.opacity * 0.8})`;
                    ctx.lineWidth = mw.width * 0.5; ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(mw.x - nx, mw.y - ny); ctx.lineTo(mw.x + nx, mw.y + ny);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${mw.opacity})`;
                    ctx.lineWidth = mw.width * 0.15; ctx.stroke();
                    ctx.shadowBlur = 0;

                } else if (mw.state === 'fading') {
                    mw.opacity -= 0.05;
                    if (mw.opacity <= 0) { milkyWays.splice(i, 1); continue; }
                    
                    ctx.beginPath();
                    ctx.moveTo(mw.x - nx, mw.y - ny); ctx.lineTo(mw.x + nx, mw.y + ny);
                    ctx.strokeStyle = `${mainColor}${mw.opacity})`;
                    ctx.lineWidth = mw.width; ctx.stroke();
                }
            }

            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                t.pulse += 0.1;
                drawGlowObj(t.x, t.y, t.r + Math.sin(t.pulse)*2, '#ffea00', '#ffea00', 15);

                if (distSq(player, t) < (player.radius + t.r) ** 2) {
                    score += 100;
                    //スコアの増える量
                    document.getElementById('score').innerText = score;
                    createParticles(t.x, t.y, '#ffea00', 15);
                    targets.splice(i, 1);
                    
                    if (!isMeteorShower) {
                        spawnEnemy();
                        if (score % 500 === 0) spawnEnemy();
                        if (Math.random() < 0.75) spawnBlueEnemy(); 
                    }
                }
            }
            if (targets.length === 0) {
                spawnTarget();
            }

            const scoreFactor = Math.floor(score / 100);

            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e.isBlue) {
                    if (e.state === 'normal') {
                        e.timer++;
                        const angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
                        e.vx += Math.cos(angleToPlayer) * (0.7 + scoreFactor * 0.05); 
                        e.vy += Math.sin(angleToPlayer) * (0.7 + scoreFactor * 0.05);
                        
                        const speedLimit = 7.5 + (scoreFactor * 0.4);
                        const currentSpeedSq = e.vx * e.vx + e.vy * e.vy;
                        if (currentSpeedSq > speedLimit * speedLimit) {
                            const currentSpeed = Math.sqrt(currentSpeedSq);
                            e.vx = (e.vx / currentSpeed) * speedLimit; e.vy = (e.vy / currentSpeed) * speedLimit;
                        }
                        if (e.timer >= 300) triggerCharge(e);
                    } else if (e.state === 'charging') { e.opacity -= 0.015; }
                } else if (!e.isMeteor && targets.length > 0) {
                    const angleToTarget = Math.atan2(targets[0].y - e.y, targets[0].x - e.x);
                    e.vx += Math.cos(angleToTarget) * 0.1; e.vy += Math.sin(angleToTarget) * 0.1;
                    
                    const speedLimit = 4 + (scoreFactor * 0.4);
                    const currentSpeedSq = e.vx * e.vx + e.vy * e.vy;
                    if (currentSpeedSq > speedLimit * speedLimit) {
                        const currentSpeed = Math.sqrt(currentSpeedSq);
                        e.vx = (e.vx / currentSpeed) * speedLimit; e.vy = (e.vy / currentSpeed) * speedLimit;
                    }
                }
                e.x += e.vx; e.y += e.vy;
            }

            let destroyedIndices = new Set();
            for (let i = 0; i < enemies.length; i++) {
                if (destroyedIndices.has(i)) continue;
                const e1 = enemies[i];
                if (e1.x < -20 || e1.x > gameWidth + 20 || e1.y < -20 || e1.y > gameHeight + 20) continue;

                // 敵同士の衝突判定ループの中（「destroyedIndices」で検索すると見つかります）
for (let j = i + 1; j < enemies.length; j++) {
    if (destroyedIndices.has(j)) continue;
    const e2 = enemies[j];
    if (e1.isMeteor && e2.isMeteor) continue;

    if (distSq(e1, e2) < (e1.r + e2.r) ** 2) {
        let collisionHandled = false;
        
        if (e1.isBlue && e1.state === 'normal') { 
            triggerCharge(e1); 
            collisionHandled = true; 
            
            // ★【追加】青い敵1の場所に黄色のスコアを落とす
            targets.push({ x: e1.x, y: e1.y, r: 8, pulse: Math.random() * Math.PI });
        } 
        else if (!e1.isBlue) { destroyedIndices.add(i); collisionHandled = true; }

        if (e2.isBlue && e2.state === 'normal') { 
            triggerCharge(e2); 
            collisionHandled = true; 
            
            // ★【追加】青い敵2の場所に黄色のスコアを落とす
            targets.push({ x: e2.x, y: e2.y, r: 8, pulse: Math.random() * Math.PI });
        } 
        else if (!e2.isBlue) { destroyedIndices.add(j); collisionHandled = true; }

        if (collisionHandled) {
            createParticles((e1.x + e2.x) / 2, (e1.y + e2.y) / 2, (e1.isBlue || e2.isBlue) ? '#00e5ff' : '#ff7676', 6);
            break; 
        }
    }
}
            }

for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.isBlue && e.opacity <= 0) { enemies.splice(i, 1); continue; }
                if (destroyedIndices.has(i) || e.x < -100 || e.x > gameWidth + 100 || e.y < -100 || e.y > gameHeight + 100) { 
                    enemies.splice(i, 1); 
                    if (!e.isMeteor && !isMeteorShower && !e.isBlue) spawnEnemy(); 
                    continue; 
                }

                if (e.isBlue) {
                    let color = `rgba(0, 150, 255, ${e.opacity})`;
                    let shadow = `rgba(0, 200, 255, ${e.opacity})`;
                    if (e.state === 'charging' && Math.floor(Date.now() / 50) % 2 === 0) color = `rgba(255, 255, 255, ${e.opacity})`;
                    drawGlowObj(e.x, e.y, e.r, color, shadow, 15);
                } else if (e.isMeteor) { drawGlowObj(e.x, e.y, e.r, '#ff5252', '#ff1744', 10); 
                } else { drawGlowObj(e.x, e.y, e.r, '#d50000', '#ff1744', 8); }

                // ==========================================
                // ★【変更】赤い敵が黄色のたまを「たくさん」奪う処理
                // ==========================================
                if (!e.isMeteor && !e.isBlue) {
                    // サイズ(e.r)が10を超えて大きくなっていたら、たまを奪う判定を1.5倍に強化
                    let targetEatRadius = e.r;
                    if (e.r > 10) {
                        targetEatRadius = e.r * 1.5; 
                    }

                    // 配列全体をループして、判定内にある黄色のたまをすべて奪い去る
                    for (let tIdx = targets.length - 1; tIdx >= 0; tIdx--) {
                        const target = targets[tIdx];
                        if (distSq(e, target) < (targetEatRadius + target.r) ** 2) {
                            createParticles(target.x, target.y, '#ff1744', 15); 
                            targets.splice(tIdx, 1); // ターゲットを消去
                        }
                    }
                    if (targets.length === 0) spawnTarget();
                }
                // ==========================================

                // ==========================================
                // ★【変更】サイズが大きくなったとき、当たり判定を増やす（プレイヤーへの判定）
                // ==========================================
                let hitRadius = e.isBlue ? e.r * e.opacity : e.r;
                
                // サイズ(e.r)が10を超えて大きくなっていたら、プレイヤーへの当たり判定を1.3倍にする
                if (e.r > 10) {
                    hitRadius *= 1.3;
                }
                // ==========================================
                
                if (player.invincibleTimer <= 0 && distSq(player, e) < (player.radius + hitRadius - 2) ** 2) { 
                    if (handlePlayerHit()) {
                        createParticles(e.x, e.y, e.isBlue ? '#00e5ff' : '#ff7676', 8);
                        enemies.splice(i, 1);
                        continue;
                    } else {
                        return; 
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill();
            }
            ctx.globalAlpha = 1;

            ctx.beginPath();
            if (player.trail.length > 0) {
                ctx.moveTo(player.trail[0].x, player.trail[0].y);
                for (let i=1; i<player.trail.length; i++) ctx.lineTo(player.trail[i].x, player.trail[i].y);
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
                ctx.lineWidth = player.radius; ctx.lineCap = 'round'; ctx.stroke();
            }

            if (player.invincibleTimer === 0 || Math.floor(Date.now() / 50) % 2 === 0) {
                drawGlowObj(player.x, player.y, player.radius, '#fff', '#00e5ff', 20);
            }

            animId = requestAnimationFrame(update);
        }

function startGame() {
    isPlaying = true; 
    isPaused = false; 
    score = 0; 
    survivalFrames = 0; 
    eventTimer = 0; 
    milkyWayTimer = 0; 
    isMeteorShower = false;
    enemies = []; 
    particles = []; 
    milkyWays = []; 
    player.trail = [];
    targets = []; 
    isEndless = false;

    document.getElementById('endlessBtn').style.display = "none";

            document.getElementById('score').innerText = score;
    
    // 開始時に5秒間（60フレーム × 5秒 = 300）の無敵時間を設定
    player.invincibleTimer = 300; 
    
    shockwave.active = false;

    document.getElementById('score').innerText = score;
    timeEl.innerText = "0.0";
    warningEl.classList.remove('blink');
    pauseScreen.classList.add('hidden');
    shareModal.classList.add('hidden');
    
    player.x = mouse.x = gameWidth / 2; 
    player.y = mouse.y = gameHeight / 2;
    document.getElementById('startScreen').classList.add('hidden');
    
    updateControlsVisibility(); 
    
    spawnTarget();
    for (let i = 0; i < 4; i++) spawnEnemy();
    spawnBlueEnemy(); 
    spawnBlueEnemy(); 
    
    update();
}

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animId);
            warningEl.classList.remove('blink');
            
            ctx.globalCompositeOperation = 'lighter';
            createParticles(player.x, player.y, '#00e5ff', 50);
            
            function renderExplode() {
                ctx.globalCompositeOperation = 'source-over';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.fillStyle = 'rgba(5,5,16,0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height);
                
                ctx.scale(zoomLevel, zoomLevel);
                ctx.globalCompositeOperation = 'lighter';

                let active = false;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                    if (p.life > 0) {
                        active = true; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
                        ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
                if(active) requestAnimationFrame(renderExplode);
                else {
                    document.getElementById('title').innerText = "GAME OVER";
                    document.getElementById('title').style.color = "#ff1744";
                    document.getElementById('msg').innerText = `最終スコア: ${score}
生存時間: ${(survivalFrames / 60).toFixed(1)}
【Space または ESCキーで一時停止】`;
                    document.getElementById('startBtn').innerText = "RETRY";
                    document.getElementById('startScreen').classList.remove('hidden');
                    updateControlsVisibility(); 
                }
            }
            renderExplode();
        }

        ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        updateControlsVisibility(); 
    </script>
